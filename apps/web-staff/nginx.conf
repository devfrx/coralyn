# nginx per la SPA staff. Serve i file statici con fallback history-mode e
# inoltra /api e /health al backend (servizio `api` della compose).
# Nessun rewrite del path: il backend monta tutto sotto /api (ADR-0022), coerente
# col proxy di Vite in dev.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://api:3000/health;
    }

    # History-mode fallback: ogni rotta sconosciuta ritorna index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
