# Coralyn — orchestrazione locale.
#
# Profili:
#   (default)      solo `db`  → workflow di sviluppo: app in locale via `pnpm dev`.
#                  Avvio:  docker compose up -d
#   --profile full db + api + web → l'intero programma in container.
#                  Avvio:  docker compose --profile full up -d --build
#                  Web:    http://localhost:8080   (proxy /api -> api)
#                  API:    http://localhost:3000   (/api, /health)
services:
  db:
    image: postgres:16
    container_name: coralyn-db
    environment:
      POSTGRES_USER: coralyn
      POSTGRES_PASSWORD: coralyn
      POSTGRES_DB: coralyn_dev
    ports:
      - "5432:5432"
    volumes:
      - coralyn-pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      # `coralyn_app` esiste solo dopo gli script di init: provarlo garantisce che
      # il ruolo applicativo (non-superuser, per la RLS) sia pronto prima di api.
      test: ["CMD-SHELL", "pg_isready -U coralyn_app -d coralyn_dev"]
      interval: 5s
      timeout: 5s
      retries: 20

  mailpit:
    image: axllent/mailpit:latest
    container_name: coralyn-mailpit
    ports:
      - "8025:8025"   # UI web
      - "1025:1025"   # SMTP

  api:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: coralyn-api
    environment:
      DATABASE_URL: "postgresql://coralyn_app:coralyn_app@db:5432/coralyn_dev?schema=public"
      PORT: "3000"
      # Identità & auth (ADR-0024/0025). Valori DEV-ONLY: in produzione passare
      # secret reali via env/secret manager, mai questi.
      JWT_SECRET: "dev-secret-change-me-at-least-32-characters-long"
      JWT_EXPIRES_IN: "8h"
      DEV_ADMIN_EMAIL: "admin@coralyn.dev"
      DEV_ADMIN_PASSWORD: "coralyn-admin-8473"
      # Seed al primo avvio: Stabilimento dev (00000000-...-0001) + primo admin,
      # così si può fare login reale (POST /api/auth/login) sul backend dockerizzato.
      SEED_ON_START: "true"
      # Sottosistema email (ADR-0042): l'api invia gli inviti set-password via SMTP a Mailpit in dev.
      MAIL_HOST: "mailpit"
      MAIL_PORT: "1025"
      MAIL_SECURE: "false"
      MAIL_FROM: "Coralyn <no-reply@coralyn.dev>"
      APP_WEB_STAFF_URL: "http://localhost:8080"
      CREDENTIAL_TOKEN_TTL_HOURS: "72"
      # Bootstrap superuser di piattaforma (seed env-gated, idempotente upsert).
      PLATFORM_SUPERUSER_EMAIL: "super@coralyn.dev"
      PLATFORM_SUPERUSER_PASSWORD: "coralyn-super-9182"
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    ports:
      - "3000:3000"

  web:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/web-staff/Dockerfile
    container_name: coralyn-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"

  web-platform:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/web-platform/Dockerfile
    container_name: coralyn-web-platform
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8081:80"

  web-customer:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/web-customer/Dockerfile
    container_name: coralyn-web-customer
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8082:80"

volumes:
  coralyn-pgdata:
