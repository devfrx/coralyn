  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ound:linear-gradient(158deg,#1A5666 0%,#0F3C49 52%,#0B3543 100%);color:#CFE0DF;display:flex;flex-direction:column;justify-content:space-between;padding:46px 48px;\">\n      <div style=\"position:absolute;left:-60px;bottom:-80px;width:320px;height:320px;border-radius:99px;background:radial-gradient(circle,rgba(224,121,90,.18),transparent 70%);pointer-events:none;\"><\u002Fdiv>\n      <div style=\"position:absolute;right:-50px;top:-40px;width:220px;height:220px;border-radius:99px;background:radial-gradient(circle,rgba(133,180,178,.20),transparent 70%);pointer-events:none;\"><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:13px;position:relative;\">\n        <img src=\"bec1dbc0-a81c-44a7-a98f-d5f95dd8fd77\" alt=\"Coralyn\" style=\"width:46px;height:46px;border-radius:13px;object-fit:cover;box-shadow:0 4px 14px rgba(0,0,0,.28);\">\n        <div style=\"line-height:1.1;\"><div style=\"font-size:22px;font-weight:700;color:#F6EEE1;letter-spacing:-.01em;\">Coralyn<\u002Fdiv><div style=\"font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#6E9197;\">Gestionale lidi<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"max-width:380px;position:relative;\">\n        <h2 style=\"font-size:30px;line-height:1.22;font-weight:700;color:#F6EEE1;letter-spacing:-.02em;margin:0 0 14px;\">Porta il tuo lido su Coralyn.<\u002Fh2>\n        <p style=\"font-size:14.5px;line-height:1.6;color:#9FBCC0;margin:0 0 22px;\">Crea l'account dello stabilimento: sarai l'amministratore e potrai configurare mappa, listino e staff.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:11px;\">\n          <div style=\"display:flex;align-items:center;gap:10px;font-size:13px;color:#CFE0DF;\"><span style=\"width:22px;height:22px;flex:none;border-radius:7px;background:rgba(133,180,178,.22);color:#9FD0CB;display:flex;align-items:center;justify-content:center;\"><svg style=\"width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;\"><use href=\"#i-check\"><\u002Fuse><\u002Fsvg><\u002Fspan>Configurazione guidata della spiaggia<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:10px;font-size:13px;color:#CFE0DF;\"><span style=\"width:22px;height:22px;flex:none;border-radius:7px;background:rgba(133,180,178,.22);color:#9FD0CB;display:flex;align-items:center;justify-content:center;\"><svg style=\"width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;\"><use href=\"#i-check\"><\u002Fuse><\u002Fsvg><\u002Fspan>Prenotazioni e abbonamenti dal primo giorno<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px;font-size:12px;color:#6E9197;position:relative;\">\n        <span style=\"width:7px;height:7px;border-radius:99px;background:#E0795A;\"><\u002Fspan>Abbonamento per stabilimento\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;display:flex;align-items:center;justify-content:center;padding:32px;overflow:auto;\">\n      <div style=\"width:100%;max-width:400px;\">\n        <h1 style=\"font-size:27px;font-weight:700;color:#22303A;letter-spacing:-.02em;margin:0 0 6px;\">Crea il tuo stabilimento<\u002Fh1>\n        <p style=\"font-size:14px;color:#978C7B;margin:0 0 24px;\">Pochi dati per iniziare. Sarai l'amministratore dell'account.<\u002Fp>\n        <label style=\"display:block;font-size:12.5px;font-weight:600;color:#5E5648;margin-bottom:6px;\">Nome dello stabilimento<\u002Flabel>\n        <input type=\"text\" placeholder=\"Lido Maestrale\" style=\"width:100%;border:1.5px solid #E0D5C3;background:#FFFFFF;border-radius:11px;padding:12px 14px;font-size:14px;color:#22303A;margin-bottom:15px;outline:none;font-family:inherit;box-sizing:border-box;\" style-focus=\"border-color:#E0795A;box-shadow:0 0 0 3px rgba(224,121,90,.16);\">\n        <label style=\"display:block;font-size:12.5px;font-weight:600;color:#5E5648;margin-bottom:6px;\">Email<\u002Flabel>\n        <input type=\"email\" placeholder=\"nome@stabilimento.it\" style=\"width:100%;border:1.5px solid #E0D5C3;background:#FFFFFF;border-radius:11px;padding:12px 14px;font-size:14px;color:#22303A;margin-bottom:15px;outline:none;font-family:inherit;box-sizing:border-box;\" style-focus=\"border-color:#E0795A;box-shadow:0 0 0 3px rgba(224,121,90,.16);\">\n        <div style=\"display:flex;gap:14px;margin-bottom:18px;\">\n          <div style=\"flex:1;\"><label style=\"display:block;font-size:12.5px;font-weight:600;color:#5E5648;margin-bottom:6px;\">Password<\u002Flabel><input type=\"password\" placeholder=\"••••••••\" style=\"width:100%;border:1.5px solid #E0D5C3;background:#FFFFFF;border-radius:11px;padding:12px 14px;font-size:14px;color:#22303A;outline:none;font-family:inherit;box-sizing:border-box;\" style-focus=\"border-color:#E0795A;box-shadow:0 0 0 3px rgba(224,121,90,.16);\"><\u002Fdiv>\n          <div style=\"flex:1;\"><label style=\"display:block;font-size:12.5px;font-weight:600;color:#5E5648;margin-bottom:6px;\">Conferma<\u002Flabel><input type=\"password\" placeholder=\"••••••••\" style=\"width:100%;border:1.5px solid #E0D5C3;background:#FFFFFF;border-radius:11px;padding:12px 14px;font-size:14px;color:#22303A;outline:none;font-family:inherit;box-sizing:border-box;\" style-focus=\"border-color:#E0795A;box-shadow:0 0 0 3px rgba(224,121,90,.16);\"><\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ goApp }}\" style=\"width:100%;border:0;background:#E0795A;color:#fff;border-radius:11px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 14px rgba(224,121,90,.32);\">Crea stabilimento<\u002Fbutton>\n        <p style=\"text-align:center;font-size:13.5px;color:#5E5648;margin:22px 0 0;\">Hai già un account? <span onclick=\"{{ goLogin }}\" style=\"color:#C9603F;font-weight:600;cursor:pointer;\">Accedi<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:820},&quot;densitaMappa&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Comoda&quot;,&quot;Compatta&quot;],&quot;default&quot;:&quot;Comoda&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Mappa&quot;},&quot;drawerIniziale&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Mappa&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.state = { section:'mappa', mapView:'plan', settore:'Centro', sel: (this.props.drawerIniziale===false ? null : 'centro-9'), view:'app', modal:null, loginError:false, modalPack:'Comfort', modalFascia:'Giornata intera', clienteSel:null,\n      strSettore:'Centro',\n      editOmb:{ label:'', tipo:'Normale', fila:'', settore:'', isNew:false },\n      newTipoIcon:'#i-umbrella',\n      newSettKind:'Griglia',\n      gen:{ prefix:'', start:1, count:10, tipo:'Normale', fila:'', settore:'', newFila:false, filaLabel:'' } };\n    this.emailRef = React.createRef();\n    this.pwdRef = React.createRef();\n    this.S = {\n      libero:{bg:'#8FBF9E',ink:'#21402C',tint:'#E7F1E9',label:'Libero'},\n      abbonato:{bg:'#5E9AA6',ink:'#0E3038',tint:'#E2EDEE',label:'Abbonato'},\n      giornaliero:{bg:'#E89270',ink:'#45200E',tint:'#FBE8DF',label:'Giornaliero'},\n      prenotato:{bg:'#F1C879',ink:'#463414',tint:'#FBF1DA',label:'Prenotato'},\n    };\n    this._cellById = {};\n    this._build();\n  }\n\n  _cellStyle(bg, ink, big){\n    const compact = this.props.densitaMappa === 'Compatta';\n    const base = compact ? 36 : 42;\n    const sz = big ? base+6 : base;\n    const fs = big ? 14 : (compact ? 12 : 13);\n    return `width:${sz}px;height:${sz}px;border-radius:99px;border:0;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:${fs}px;font-weight:600;font-variant-numeric:tabular-nums;background:${bg};color:${ink};box-shadow:0 1px 2px rgba(15,60,73,.16);transition:transform .12s ease,box-shadow .12s ease;`;\n  }\n\n  // planimetria — ombrellone visto dall'alto (calotta + ombra sulla sabbia)\n  _planCellStyle(cell){\n    const sel = this.state.sel===cell.id;\n    const compact = this.props.densitaMappa === 'Compatta';\n    const sz = (cell.big? 52 : 42) - (compact?4:0);\n    const fs = (cell.big? 14 : 12.5) - (compact?1:0);\n    const hi = 'radial-gradient(circle at 33% 27%,rgba(255,255,255,.55),rgba(255,255,255,0) 58%)';\n    let bg, ink;\n    if(cell.kind==='split'){\n      bg = `${hi},linear-gradient(120deg,${this.S[cell.mattK].bg} 0 47%,rgba(255,255,255,.85) 47% 53%,${this.S[cell.pomK].bg} 53% 100%)`;\n      ink = '#2B2722';\n    } else {\n      bg = `${hi},${this.S[cell.kind].bg}`;\n      ink = this.S[cell.kind].ink;\n    }\n    let s = `width:${sz}px;height:${sz}px;flex:none;border-radius:99px;border:1.5px solid rgba(255,255,255,.7);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:${fs}px;font-weight:600;font-variant-numeric:tabular-nums;background:${bg};color:${ink};box-shadow:0 1px 2px rgba(15,60,73,.18),6px 8px 0 -2px rgba(120,86,38,.13);transition:transform .12s ease,box-shadow .12s ease;`;\n    if(sel) s += 'outline:2.5px solid #E0795A;outline-offset:2px;box-shadow:0 0 0 5px rgba(224,121,90,.2),6px 8px 0 -2px rgba(120,86,38,.13);transform:translateY(-1px) scale(1.05);position:relative;z-index:3;';\n    return s;\n  }\n\n  // c(id, lab, kind, opts) — kind: 'libero'|'abbonato'|'giornaliero'|'prenotato'|'split'\n  _c(id, lab, kind, opts){\n    opts = opts || {};\n    const big = !!opts.big;\n    const S = this.S;\n    let bg, ink, matt, pom, mattK, pomK;\n    if(kind==='split'){\n      mattK = opts.matt; pomK = opts.pom;\n      bg = `linear-gradient(90deg,${S[mattK].bg} 0 48%,rgba(255,255,255,.8) 48% 52%,${S[pomK].bg} 52% 100%)`;\n      ink = '#2B2722';\n      matt = S[mattK].label; pom = S[pomK].label;\n    } else {\n      bg = S[kind].bg; ink = S[kind].ink;\n      mattK = kind; pomK = kind; matt = S[kind].label; pom = S[kind].label;\n    }\n    const tipo = opts.tipo || 'Normale';\n    const markMap = {leaf:'#i-leaf', palm:'#i-palm'};\n    const mark = opts.mark ? markMap[opts.mark] : '';\n    let sel = (this.state.sel === id);\n    let style = this._cellStyle(bg, ink, big);\n    if(sel) style += 'outline:2.5px solid #E0795A;outline-offset:2px;box-shadow:0 0 0 5px rgba(224,121,90,.18);transform:translateY(-1px);';\n    const aria = `Ombrellone ${lab}, Settore ${opts.settore||''} ${opts.fila||''}, tipologia ${tipo}, mattina ${matt.toLowerCase()}, pomeriggio ${pom.toLowerCase()}${sel?', selezionato':''}`;\n    const cell = {\n      id, lab, kind, big, style, mark,\n      tipo, tipoIcon: opts.mark==='palm'?'#i-palm':(opts.mark==='leaf'?'#i-leaf':'#i-umbrella'),\n      aria,\n      crumb: `Settore ${opts.settore||''} · ${opts.fila||''}`,\n      matt, pom, mattK, pomK,\n      booking: opts.booking || null,\n    };\n    this._cellById[id] = cell;\n    return cell;\n  }\n\n  _build(){\n    const C = (id,lab,kind,o)=>this._c(id,lab,kind,o);\n    const bk = (cliente,pacchetto,periodo,pay,importo,metodo)=>({cliente,pacchetto,periodo,pay,importo,metodo});\n    const sC = 'Centro', sL = 'Levante';\n    this._settori = {\n      Centro: [\n        { nome:'Fila 1', celle:[\n          C('centro-1','1','giornaliero',{settore:sC,fila:'Fila 1',mark:'leaf',tipo:'Mini-palma',booking:bk('Bianchi Elena','Comfort','Sab 27 giu','day',28,'Carta')}),\n          C('centro-2','2','libero',{settore:sC,fila:'Fila 1',mark:'leaf',tipo:'Mini-palma'}),\n          C('centro-3','3','abbonato',{settore:sC,fila:'Fila 1',mark:'leaf',tipo:'Mini-palma',booking:bk('Rossi Mario','Premium','Stagione 2026','full',1180,'Bonifico')}),\n          C('centro-4','4','prenotato',{settore:sC,fila:'Fila 1',mark:'leaf',tipo:'Mini-palma',booking:bk('Greco Anna','Comfort','Sab 27 – Dom 28 giu','part',32,'Contanti')}),\n          C('centro-5','5','libero',{settore:sC,fila:'Fila 1',mark:'leaf',tipo:'Mini-palma'}),\n          C('centro-6','6','abbonato',{settore:sC,fila:'Fila 1',mark:'leaf',tipo:'Mini-palma',booking:bk('Ferri Luca','Premium','Stagione 2026','full',1180,'Bonifico')}),\n        ]},\n        { nome:'Fila 2', celle:[\n          C('centro-7','7','abbonato',{settore:sC,fila:'Fila 2',booking:bk('Conti Sara','Comfort','Stagione 2026','full',940,'Carta')}),\n          C('centro-8','8','libero',{settore:sC,fila:'Fila 2'}),\n          C('centro-9','9','split',{settore:sC,fila:'Fila 2',matt:'prenotato',pom:'libero',booking:bk('Rossi Mario','Comfort','Sab 27 giu','full',25,'Contanti')}),\n          C('centro-10','10','abbonato',{settore:sC,fila:'Fila 2',booking:bk('De Luca Marco','Comfort','Stagione 2026','full',940,'Bonifico')}),\n          C('centro-11','11','giornaliero',{settore:sC,fila:'Fila 2',booking:bk('Villa Paolo','Base','Sab 27 giu','full',22,'Contanti')}),\n          C('centro-12','12','libero',{settore:sC,fila:'Fila 2'}),\n        ]},\n        { nome:'Fila 3', celle:[\n          C('centro-13','13','libero',{settore:sC,fila:'Fila 3'}),\n          C('centro-14','14','abbonato',{settore:sC,fila:'Fila 3',booking:bk('Moretti Chiara','Base','Stagione 2026','full',760,'Carta')}),\n          C('centro-15','15','abbonato',{settore:sC,fila:'Fila 3',booking:bk('Gatti Franco','Comfort','Stagione 2026','part',940,'Contanti')}),\n          C('centro-16','16','prenotato',{settore:sC,fila:'Fila 3',booking:bk('Sala Roberto','Base','Sab 27 – Lun 29 giu','part',60,'Carta')}),\n          C('centro-17','17','libero',{settore:sC,fila:'Fila 3'}),\n          C('centro-18','18','giornaliero',{settore:sC,fila:'Fila 3',booking:bk('Neri Giada','Base','Sab 27 giu','full',22,'Contanti')}),\n        ]},\n        { nome:'Fila 4', celle:[\n          C('centro-19','19','giornaliero',{settore:sC,fila:'Fila 4',booking:bk('Costa Davide','Base','Sab 27 giu','full',20,'Contanti')}),\n          C('centro-20','20','libero',{settore:sC,fila:'Fila 4'}),\n          C('centro-22','22','abbonato',{settore:sC,fila:'Fila 4',booking:bk('Lombardi Ivan','Base','Stagione 2026','full',680,'Bonifico')}),\n          C('centro-22b','22bis','libero',{settore:sC,fila:'Fila 4'}),\n          C('centro-23','23','abbonato',{settore:sC,fila:'Fila 4',booking:bk('Marini Ada','Comfort','Stagione 2026','full',880,'Carta')}),\n        ]},\n      ],\n      Levante: [\n        { nome:'Fila 1', celle:[\n          C('lev-30','30','libero',{settore:sL,fila:'Fila 1'}),\n          C('lev-31','31','abbonato',{settore:sL,fila:'Fila 1',booking:bk('Russo Teresa','Premium','Stagione 2026','full',1120,'Bonifico')}),\n          C('lev-32','32','libero',{settore:sL,fila:'Fila 1'}),\n          C('lev-33','33','prenotato',{settore:sL,fila:'Fila 1',booking:bk('Esposito Gino','Comfort','Sab 27 giu','full',30,'Carta')}),\n          C('lev-34','34','libero',{settore:sL,fila:'Fila 1'}),\n        ]},\n        { nome:'Fila 2', celle:[\n          C('lev-35','35','abbonato',{settore:sL,fila:'Fila 2',booking:bk('Fabbri Nadia','Comfort','Stagione 2026','full',920,'Carta')}),\n          C('lev-36','36','split',{settore:sL,fila:'Fila 2',matt:'libero',pom:'giornaliero',booking:bk('Pace Ugo','Base','Sab 27 giu pom.','full',14,'Contanti')}),\n          C('lev-37','37','libero',{settore:sL,fila:'Fila 2'}),\n          C('lev-38','38','abbonato',{settore:sL,fila:'Fila 2',booking:bk('Riva Sonia','Base','Stagione 2026','full',720,'Bonifico')}),\n          C('lev-39','39','giornaliero',{settore:sL,fila:'Fila 2',booking:bk('Longo Enzo','Base','Sab 27 giu','full',20,'Contanti')}),\n        ]},\n        { nome:'Fila 3', celle:[\n          C('lev-40','40','libero',{settore:sL,fila:'Fila 3'}),\n          C('lev-41','41','libero',{settore:sL,fila:'Fila 3'}),\n          C('lev-42','42','abbonato',{settore:sL,fila:'Fila 3',booking:bk('Caruso Lia','Base','Stagione 2026','full',680,'Cart eturn pal[i%pal.length];\n  }\n\n  renderVals(){\n    const sec = this.state.section;\n    const setSection = (s)=>()=>this.setState({section:s, clienteSel:null});\n\n    const navDefs = [\n      {id:'mappa',label:'Mappa',href:'#i-map'},\n      {id:'prenotazioni',label:'Prenotazioni',href:'#i-cal'},\n      {id:'clienti',label:'Clienti',href:'#i-users'},\n      {id:'listino',label:'Listino',href:'#i-tag'},\n      {id:'report',label:'Report',href:'#i-chart'},\n    ];\n    const nav = navDefs.map(n=>({...n, active: sec===n.id, style:this._navStyle(sec===n.id), onClick:setSection(n.id)}));\n\n    // --- conteggi struttura (derivati dai dati mappa) ---\n    const tipoIconMap = {'Normale':'#i-umbrella','Mini-palma':'#i-leaf','Palma':'#i-palm'};\n    const settoriMeta = [\n      {key:'Centro', kind:'Griglia'},\n      {key:'Levante', kind:'Griglia'},\n      {key:'Speciali', kind:'Speciali'},\n    ];\n    const fileOf = (key)=> key==='Speciali'\n      ? [{label:'Palme', celle:this._speciali}]\n      : (this._settori[key]||[]).map(r=>({label:r.nome, celle:r.celle}));\n    const allCells = [];\n    settoriMeta.forEach(m=>fileOf(m.key).forEach(f=>f.celle.forEach(c=>allCells.push(c))));\n    const nSettori = settoriMeta.length;\n    const nFile = settoriMeta.reduce((n,m)=>n+fileOf(m.key).length,0);\n    const nOmbrelloni = allCells.length;\n    const tipoCount = {};\n    allCells.forEach(c=>{ tipoCount[c.tipo]=(tipoCount[c.tipo]||0)+1; });\n    const tipologieDefs = [\n      {nome:'Normale', icon:'#i-umbrella', desc:'Ombrellone standard, senza copertura in paglia.'},\n      {nome:'Mini-palma', icon:'#i-leaf', desc:'Piccola copertura in paglia, tipica delle prime file.'},\n      {nome:'Palma', icon:'#i-palm', desc:'Grande copertura in paglia degli ombrelloni speciali.'},\n    ];\n    const nTipologie = tipologieDefs.length;\n\n    const titles = {\n      mappa:['Mappa','Lido Maestrale · '+nOmbrelloni+' ombrelloni · vista per giornata'],\n      prenotazioni:['Prenotazioni','Elenco
